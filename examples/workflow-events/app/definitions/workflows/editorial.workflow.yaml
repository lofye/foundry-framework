version: 1
resource: editorial
states: [draft, review, published]
transitions:
  submit_story:
    from: [draft]
    to: review
    emit: [story.submitted]
  review_story:
    from: [review]
    to: review
    emit: [story.review_requested]
  publish_story:
    from: [review]
    to: published
    emit: [story.published]
