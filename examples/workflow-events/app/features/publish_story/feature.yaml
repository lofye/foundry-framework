version: 2
feature: publish_story
kind: http
description: Publish a reviewed story and emit the final public event.
owners:
  - examples
route:
  method: POST
  path: /editorial/stories/publish
input:
  schema: app/features/publish_story/input.schema.json
output:
  schema: app/features/publish_story/output.schema.json
auth:
  required: true
  strategies:
    - bearer
  permissions:
    - editorial.publish
database:
  reads: []
  writes: []
  transactions: required
  queries: []
cache:
  reads: []
  writes: []
  invalidate:
    - stories:list
events:
  emit:
    - story.published
  subscribe:
    - story.review_requested
jobs:
  dispatch:
    - refresh_story_feed
rate_limit:
  strategy: user
  bucket: publish_story
  cost: 1
observability:
  audit: true
  trace: true
  log_level: info
tests:
  required:
    - auth
    - contract
    - feature
llm:
  editable: true
  risk_level: medium
  notes_file: prompts.md
