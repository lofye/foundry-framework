version: 2
feature: review_story
kind: http
description: Request review on a submitted story and emit the handoff event.
owners:
  - examples
route:
  method: POST
  path: /editorial/stories/review
input:
  schema: app/features/review_story/input.schema.json
output:
  schema: app/features/review_story/output.schema.json
auth:
  required: true
  strategies:
    - bearer
  permissions:
    - editorial.review
database:
  reads: []
  writes: []
  transactions: required
  queries: []
cache:
  reads: []
  writes: []
  invalidate: []
events:
  emit:
    - story.review_requested
  subscribe:
    - story.submitted
jobs:
  dispatch: []
rate_limit:
  strategy: user
  bucket: review_story
  cost: 1
observability:
  audit: true
  trace: true
  log_level: info
tests:
  required:
    - auth
    - contract
    - feature
llm:
  editable: true
  risk_level: low
  notes_file: prompts.md
