version: 2
feature: submit_story
kind: http
description: Create a story, move it into review, and emit the first editorial event.
owners:
  - examples
route:
  method: POST
  path: /editorial/stories
input:
  schema: app/features/submit_story/input.schema.json
output:
  schema: app/features/submit_story/output.schema.json
auth:
  required: true
  strategies:
    - bearer
  permissions: []
database:
  reads:
    - stories
  writes:
    - stories
  transactions: required
  queries: []
cache:
  reads: []
  writes: []
  invalidate:
    - editorial:stories
events:
  emit:
    - story.submitted
  subscribe: []
observability:
  audit: true
  trace: true
  log_level: info
tests:
  required:
    - feature
llm:
  editable: true
  risk_level: low
