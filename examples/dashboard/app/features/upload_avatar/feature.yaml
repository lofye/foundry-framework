version: 2
feature: upload_avatar
kind: http
description: upload_avatar endpoint for dashboard.
owners:
  - dashboard
route:
  method: POST
  path: /avatar
input:
  schema: app/features/upload_avatar/input.schema.json
output:
  schema: app/features/upload_avatar/output.schema.json
auth:
  required: true
  strategies:
    - bearer
  permissions:
    - upload_avatar.execute
database:
  reads: []
  writes: []
  transactions: required
  queries: []
cache:
  reads: []
  writes: []
  invalidate: []
events:
  emit: []
  subscribe: []
jobs:
  dispatch: []
rate_limit:
  strategy: user
  bucket: upload_avatar
  cost: 1
observability:
  audit: true
  trace: true
  log_level: info
tests:
  required:
    - contract
    - feature
    - auth
llm:
  editable: true
  risk_level: low
  notes_file: prompts.md
