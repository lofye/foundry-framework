version: 2
feature: login
kind: http
description: login endpoint for dashboard.
owners:
  - dashboard
route:
  method: POST
  path: /login
input:
  schema: app/features/login/input.schema.json
output:
  schema: app/features/login/output.schema.json
auth:
  required: true
  strategies:
    - bearer
  permissions:
    - login.execute
database:
  reads: []
  writes: []
  transactions: required
  queries: []
cache:
  reads: []
  writes: []
  invalidate: []
events:
  emit: []
  subscribe: []
jobs:
  dispatch: []
rate_limit:
  strategy: user
  bucket: login
  cost: 1
observability:
  audit: true
  trace: true
  log_level: info
tests:
  required:
    - contract
    - feature
    - auth
llm:
  editable: true
  risk_level: low
  notes_file: prompts.md
