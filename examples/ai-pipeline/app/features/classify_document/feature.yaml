version: 2
feature: classify_document
kind: http
description: classify_document endpoint for ai-pipeline.
owners:
  - ai-pipeline
route:
  method: POST
  path: /documents/{id}/classify
input:
  schema: app/features/classify_document/input.schema.json
output:
  schema: app/features/classify_document/output.schema.json
auth:
  required: true
  strategies:
    - bearer
  permissions:
    - classify_document.execute
database:
  reads: []
  writes: []
  transactions: required
  queries: []
cache:
  reads: []
  writes: []
  invalidate: []
events:
  emit: []
  subscribe: []
jobs:
  dispatch: []
rate_limit:
  strategy: user
  bucket: classify_document
  cost: 1
observability:
  audit: true
  trace: true
  log_level: info
tests:
  required:
    - contract
    - feature
    - auth
llm:
  editable: true
  risk_level: low
  notes_file: prompts.md
