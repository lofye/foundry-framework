version: 1
resource: posts
style: api
model:
  table: posts
  primary_key: id
fields:
  title:
    type: string
    required: true
  slug:
    type: string
    required: true
  body_markdown:
    type: text
    required: true
auth:
  list: posts.view
  view: posts.view
  create: posts.create
  update: posts.update
  delete: posts.delete
features:
  - list
  - view
  - create
  - update
  - delete
feature_names:
  list: api-list-posts
  view: api-view-post
  create: api-create-post
  update: api-update-post
  delete: api-delete-post
