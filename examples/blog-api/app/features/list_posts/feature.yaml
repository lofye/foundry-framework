version: 2
feature: list_posts
kind: http
description: list_posts endpoint for blog-api.
owners:
  - blog-api
route:
  method: GET
  path: /posts
input:
  schema: app/features/list_posts/input.schema.json
output:
  schema: app/features/list_posts/output.schema.json
auth:
  required: true
  strategies:
    - bearer
  permissions:
    - list_posts.execute
database:
  reads: []
  writes: []
  transactions: required
  queries: []
cache:
  reads: []
  writes: []
  invalidate: []
events:
  emit: []
  subscribe: []
jobs:
  dispatch: []
rate_limit:
  strategy: user
  bucket: list_posts
  cost: 1
observability:
  audit: true
  trace: true
  log_level: info
tests:
  required:
    - contract
    - feature
    - auth
llm:
  editable: true
  risk_level: low
  notes_file: prompts.md
