version: 2
feature: view_post
kind: http
description: Read one published post through an explicit route-param feature.
owners:
  - examples
route:
  method: GET
  path: /posts/{post_id}
input:
  schema: app/features/view_post/input.schema.json
output:
  schema: app/features/view_post/output.schema.json
auth:
  required: false
  public: true
  strategies: []
  permissions: []
database:
  reads:
    - posts
  writes: []
  transactions: optional
  queries: []
observability:
  audit: false
  trace: true
  log_level: info
tests:
  required:
    - feature
llm:
  editable: true
  risk_level: low
