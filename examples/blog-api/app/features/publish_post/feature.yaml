version: 2
feature: publish_post
kind: http
description: Publish a post through a protected route and emit a visible graph event.
owners:
  - examples
route:
  method: POST
  path: /posts
input:
  schema: app/features/publish_post/input.schema.json
output:
  schema: app/features/publish_post/output.schema.json
auth:
  required: true
  strategies:
    - bearer
  permissions: []
database:
  reads:
    - posts
  writes:
    - posts
  transactions: required
  queries: []
cache:
  reads: []
  writes: []
  invalidate:
    - posts:list
events:
  emit:
    - post.published
  subscribe: []
observability:
  audit: true
  trace: true
  log_level: info
tests:
  required:
    - feature
llm:
  editable: true
  risk_level: low
